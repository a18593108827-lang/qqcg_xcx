server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/qqcg_xcx?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}

logging:
  level:
    org.hibernate.SQL: info

wechat:
  appid: ${WX_APPID:}
  secret: ${WX_SECRET:}

